<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Категорії — РІО</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; font-family: system-ui, sans-serif; }
    .cat-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #eee; }
    .cat-row:last-of-type { border-bottom: none; }
    .cat-name { flex: 1; font-size: .95rem; }
    .cat-type { font-size: .8rem; color: #888; font-family: monospace; }
  </style>
</head>
<body>

<div class="container-lg py-4">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="/admin" class="btn btn-sm btn-outline-secondary">← Адмін-панель</a>
    <h4 class="mb-0">Категорії</h4>
    <button class="btn btn-sm btn-primary ms-auto" onclick="openCreate()">+ Додати</button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      {% for cat in categories %}
      <div class="cat-row">
        <span class="cat-name">{{ cat.name }}</span>
        <span class="cat-type">{{ cat.type }}</span>
        <button class="btn btn-sm btn-outline-primary"
          onclick='openEdit({{ cat.id }}, {{ cat.name|tojson }}, {{ cat.type|tojson }})'>✏️</button>
        <button class="btn btn-sm btn-outline-danger"
          onclick='askDelete({{ cat.id }}, {{ cat.name|tojson }})'>🗑️</button>
      </div>
      {% else %}
      <div class="p-3 text-muted">Категорій ще немає.</div>
      {% endfor %}
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="catModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="POST" action="/admin/categories">
        <input type="hidden" name="_action" value="save">
        <input type="hidden" name="id" id="f-id">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-title">Нова категорія</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Назва <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="name" id="f-name" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Тип <span class="text-danger">*</span></label>
            <select class="form-select" name="type" id="f-type" required>
              {% for val, label in type_labels.items() %}
              <option value="{{ val }}">{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
          <button type="submit" class="btn btn-primary">Зберегти</button>
        </div>
      </form>
    </div>
  </div>
</div>

<form id="del-form" method="POST" action="/admin/categories" style="display:none">
  <input type="hidden" name="_action" value="delete">
  <input type="hidden" name="id" id="del-id">
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const modal = new bootstrap.Modal(document.getElementById('catModal'));

function openCreate() {
  document.getElementById('modal-title').textContent = 'Нова категорія';
  document.getElementById('f-id').value = 0;
  document.getElementById('f-name').value = '';
  document.getElementById('f-type').value = 'venue';
  modal.show();
  setTimeout(() => document.getElementById('f-name').focus(), 300);
}

function openEdit(id, name, type) {
  document.getElementById('modal-title').textContent = 'Редагувати категорію';
  document.getElementById('f-id').value = id;
  document.getElementById('f-name').value = name;
  document.getElementById('f-type').value = type;
  modal.show();
  setTimeout(() => document.getElementById('f-name').focus(), 300);
}

function askDelete(id, name) {
  if (!confirm(`Видалити категорію «${name}»?\n\nВсі послуги в ній теж видаляться.`)) return;
  document.getElementById('del-id').value = id;
  document.getElementById('del-form').submit();
}
</script>
</body>
</html>
