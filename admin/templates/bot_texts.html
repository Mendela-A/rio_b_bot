<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тексти бота — РІО</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; font-family: system-ui, sans-serif; }
    .text-card { border-left: 4px solid #206bc4; }
    .text-key { font-family: monospace; font-size: .82rem; color: #555; }
    .text-hint { font-size: .82rem; color: #888; }
    .custom-badge { font-size: .7rem; }
    textarea.form-control { min-height: 80px; resize: vertical; }
  </style>
</head>
<body>

<div class="container-lg py-4">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="/admin" class="btn btn-sm btn-outline-secondary">← Адмін-панель</a>
    <h4 class="mb-0">Тексти бота</h4>
  </div>

  <p class="text-muted small mb-4">
    Зміни набирають чинності протягом хвилини (без перезапуску бота).
    «Скинути» — поверне стандартний текст.
  </p>

  {% for item in items %}
  <div class="card text-card shadow-sm mb-3">
    <div class="card-body">
      <div class="d-flex align-items-start justify-content-between mb-2">
        <div>
          <span class="text-key">{{ item.key }}</span>
          {% if item.is_custom %}
            <span class="badge bg-primary custom-badge ms-2">змінено</span>
          {% endif %}
          <div class="text-hint mt-1">{{ item.hint }}</div>
        </div>
      </div>

      <form method="POST" action="/admin/bot-texts" class="d-flex gap-2 align-items-end">
        <input type="hidden" name="_action" value="save">
        <input type="hidden" name="key" value="{{ item.key }}">
        <div class="flex-grow-1">
          <textarea class="form-control font-monospace" name="value" rows="3">{{ item.value }}</textarea>
        </div>
        <div class="d-flex flex-column gap-2">
          <button type="submit" class="btn btn-sm btn-primary">Зберегти</button>
          {% if item.is_custom %}
          <button type="submit" name="_action" value="reset" class="btn btn-sm btn-outline-secondary"
                  onclick="return confirm('Скинути до стандартного тексту?')">Скинути</button>
          {% endif %}
        </div>
      </form>
    </div>
  </div>
  {% endfor %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
