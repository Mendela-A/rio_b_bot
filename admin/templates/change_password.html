{% extends "base.html" %}

{% block title %}Зміна пароля — РІО{% endblock %}
{% block page_title %}Зміна пароля{% endblock %}

{% block content %}

<div class="card" style="max-width:480px">
  <div class="card-header">🔑 Змінити свій пароль</div>
  <div class="card-body">

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/admin/change-password" class="d-flex flex-column gap-3">
      <div>
        <label class="form-label">Поточний пароль</label>
        <input type="password" class="form-control" name="old_password" required autocomplete="current-password">
      </div>
      <div>
        <label class="form-label">Новий пароль</label>
        <input type="password" class="form-control" name="password" required autocomplete="new-password">
      </div>
      <div>
        <label class="form-label">Підтвердження</label>
        <input type="password" class="form-control" name="confirm" required>
      </div>
      <div>
        <button type="submit" class="btn btn-primary">Зберегти</button>
      </div>
    </form>

  </div>
</div>

{% endblock %}
