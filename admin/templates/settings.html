{% extends "base.html" %}

{% block title %}Налаштування — РІО{% endblock %}
{% block page_title %}Налаштування{% endblock %}

{% block content %}

{% if saved %}
<div class="alert alert-success py-2 mb-4" style="font-size:.9rem">✅ Збережено</div>
{% endif %}

<form method="POST" action="/admin/settings">
  <div class="card">
    <div class="card-header">⚙️ Загальні налаштування</div>
    <div class="card-body">

      {% for item in items %}
      <div class="mb-4">
        <label class="form-label" for="f-{{ item.key }}">{{ item.label }}</label>
        <div class="text-hint mb-2">{{ item.hint }}</div>
        <input
          type="{{ item.type }}"
          class="form-control"
          id="f-{{ item.key }}"
          name="{{ item.key }}"
          value="{{ item.value }}"
          {% if item.min is defined %}min="{{ item.min }}"{% endif %}
          {% if item.max is defined %}max="{{ item.max }}"{% endif %}
          style="max-width: 180px"
          required
        >
      </div>
      {% endfor %}

    </div>
    <div class="card-footer bg-transparent border-top" style="padding: 12px 16px">
      <button type="submit" class="btn btn-primary">Зберегти</button>
    </div>
  </div>
</form>

{% endblock %}
